<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="LJ Sarmiento">
    <title>Sumthin</title>
</head>
<style>
    body {
        border-collapse: collapse;
        width: 80%;
        margin-left: auto;
        margin-right: auto;
        position: center;
    }

    .stars {
        font-size: 30px;
         color: gray;
        cursor: pointer;
    }

    .stars.active {
        color: gold;
    }

</style>

<body>
    <h1>
        Add a Movie
    </h1>

    <form id="MovieForm">
        <label for="title">Title:</label><br></br>
        <input type="text" id="title" name="title"><br></br>
        <label for="year">Year:</label><br></br>
        <input type="number" id="year" name="title"><br></br>
        <label> Genre:
            <select name="genre" id="genre">
             <option value="action">Action</option>
             <option value="comedy">Comedy</option>
             <option value="drama">Drama</option>
             <option value="romance">Romance</option>
             <option value="horror">Horror</option>
            </select>   
        </label><br/><br/>
        <div class="stars" id="rating">
            <span class="star" data-value="1">⭐</span>
            <span class="star" data-value="2">⭐</span>
            <span class="star" data-value="3">⭐</span>
            <span class="star" data-value="4">⭐</span>
            <span class="star" data-value="5">⭐</span>
        </div>
    </form>
    <button type="submit">Add Movie</button>
    <h2>
        Movie List
    </h2>
    <div id="movieList"></div>
    <script>
        const star = document.querySelectorAll(".stars")

        let Rating = 0;

        star.forEach(stars) {
            star.addEventListener("click", function()) {
                rating = this.dataset.value;

                updateStars(rating);
            }
        }

        function updateStars(rating) {

        stars.forEach(star) {

            if(star.dataset.value <= rating){
                star.classList.add("active");
            } 
            
            else {
                star.classList.remove("active");
            }

        };

        }


        let movies = [];

        document.getElementById("MovieForm").addEventListener("submit", function(e)) {
            e.preventDefault();

            let title = document.getElementById("title").value;
            let year = document.getElementById("year").value;
            let genre = document.getElementById("genre").value;
            let rating = Rating;

            let movIelist = {title, year, genre, rating}

            movies.push(movielist);

            displayMovies();
        }


        function displayMovies() {
            const movielist = document.getElementById("movieList");
            movielist.innerHTML="";

            movies.forEach(function(movIelist)) {
                const div = document.createElement("div");

                div.textContent = 
                `${movIelist.title} (${movIelist.year}) - ${movIelist.genre}, Rating: ${}`;

                movielist.appendChild(div);
            }

        }

        localStorage.setItem("movies", JSON.stringify(movies));

        let savedmovie = localStorage.getItem("movie");

        if (savedmovie) {
            movies = JSON.parse(savedmovie)
            displayMovies();
        }
    </script>
    
    
    


</body>







</html>
